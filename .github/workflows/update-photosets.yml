name: Auto Update Photo Sets

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape photo sets
        run: node scrape.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/photoSets.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and deploy if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/photoSets.json
          git commit -m "auto: update photo sets from shop"
          git push
          npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No new photo sets found."
